<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Fussion</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e0e0e;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .app-container {
            text-align: center;
            background: #1c1c1c;
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 85%;
            max-width: 350px;
            border: 1px solid #333;
        }
        .logo-img {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            border-radius: 50%;
            border: 3px solid #f39c12;
        }
        h1 { font-size: 26px; color: #f39c12; margin: 10px 0; }
        p { color: #aaa; font-size: 15px; line-height: 1.4; }
        .btn-show-ad {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <img src="https://durbertech-cmd.github.io/Index.html/1000030605.png" class="logo-img" alt="Logo">
        <h1>Make Fussion</h1>
        <p>Welcome to your personal ad bot. Click below to start earning.</p>
        
        <button class="btn-show-ad" onclick="loadAd()">Show Ad & Support</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function loadAd() {
            // Eikhane Monetag theke pawa Direct Link-ti bosiye din
            const adUrl = "APNAR_MONETAG_DIRECT_LINK";
            
            if(adUrl === "APNAR_MONETAG_DIRECT_LINK") {
                alert("Please add your Monetag Direct Link in the code.");
            } else {
                tg.openLink(adUrl);
            }
        }
    </script>
</body>
</html>
