<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Ads</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src='//libtl.com/sdk.js' data-zone='10843667' data-sdk='show_10843667'></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1c1c1c;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: #2b2b2b;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 80%;
        }
        h1 { font-size: 20px; margin-bottom: 20px; }
        .ad-status {
            color: #4CAF50;
            font-size: 14px;
            margin-top: 10px;
        }
        .btn-refresh {
            background: #0088cc;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Monetag Ad Integration</h1>
        <p>Ads should appear automatically based on your zone settings.</p>
        
        <div id="status" class="ad-status">SDK Loaded...</div>
        
        <button class="btn-refresh" onclick="location.reload()">Refresh Page</button>
    </div>

    <script>
        // Telegram Web App Initialization
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full screen korar jonno

        // Ad trigger check (Optional)
        window.onload = function() {
            console.log("Page loaded, Monetag SDK active.");
            document.getElementById('status').innerText = "Ads are being served.";
        };
    </script>

</body>
</html>
